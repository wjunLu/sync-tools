name: One-off parallel sync mindie to quay

on:
  workflow_dispatch:
    inputs:
      group_count:
        description: 'Number of parallel groups'
        required: false
        default: '8'

jobs:
  prepare:
    name: List tags and split into groups
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Install jq
        run: microdnf install -y jq

      - name: List tags and split
        id: set-matrix
        run: |
          set -euo pipefail
          SRC="swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie"
          GCOUNT="${{ inputs.group_count }}"
          GCOUNT="${GCOUNT:-8}"
          [ "$GCOUNT" -gt 0 ] 2>/dev/null || GCOUNT=8

          TAGS=$(skopeo list-tags --no-creds docker://"$SRC" | jq -r '.Tags[]' | sort -u)
          if [ -z "$TAGS" ]; then
            echo "No tags found for $SRC"
            exit 1
          fi
          TOTAL=$(echo "$TAGS" | wc -l)
          echo "Found $TOTAL tags, splitting into $GCOUNT groups"

          matrix=$(echo "$TAGS" | jq -R -s -c --argjson g "$GCOUNT" '
            split("\n") | map(select(length > 0)) as $tags
            | ($tags | length) as $total
            | (($total + $g - 1) / $g | floor) as $chunk
            | [range(0; $g)] | map({
                group: (. + 1),
                tags: ($tags[(. * $chunk):((. + 1) * $chunk)] | join(" "))
              }) | map(select(.tags != ""))
          ')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

  sync:
    name: Sync group ${{ matrix.group }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Install jq
        run: microdnf install -y jq

      - name: Sync tags in this group
        env:
          QUAY_USER: ${{ vars.QUAY_ASCEND_USER }}
          QUAY_PWD: ${{ secrets.QUAY_ASCEND_PWD }}
        run: |
          set -uo pipefail
          SRC="swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie"
          DEST="quay.io/ascend/mindie"

          manifest_id() {
            local raw
            raw=$(skopeo inspect --raw "$@" 2>/dev/null || true)
            [ -z "$raw" ] && echo "" && return
            echo "$raw" | jq -r '
              if .manifests then [.manifests[].digest] | sort | join(",")
              else .config.digest // empty end
            ' 2>/dev/null || true
          }

          SYNCED=0; SKIPPED=0; FAILED=0; FAILED_TAGS=""
          for tag in ${{ matrix.tags }}; do
            echo ""
            echo "--- $SRC:$tag → $DEST:$tag ---"

            SRC_ID=$(manifest_id --no-creds "docker://$SRC:$tag")
            DEST_ID=$(manifest_id --creds "${QUAY_USER}:${QUAY_PWD}" "docker://$DEST:$tag")

            if [ -n "$SRC_ID" ] && [ "$SRC_ID" = "$DEST_ID" ]; then
              echo "⏭️  Skip $tag (digest match)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            skopeo copy --all \
              --retry-times 3 \
              --retry-delay 5s \
              --src-no-creds \
              --dest-creds "${QUAY_USER}:${QUAY_PWD}" \
              "docker://$SRC:$tag" "docker://$DEST:$tag"
            rc=$?
            if [ $rc -eq 0 ] || [ $rc -eq 2 ]; then
              echo "✅ Synced $tag"
              SYNCED=$((SYNCED + 1))
            else
              echo "❌ Failed $tag (exit $rc)"
              FAILED=$((FAILED + 1))
              FAILED_TAGS="$FAILED_TAGS $tag"
            fi
          done

          echo ""
          echo "Group ${{ matrix.group }} done: $SYNCED synced, $SKIPPED skipped, $FAILED failed"
          [ $FAILED -eq 0 ] || { echo "Failed tags:$FAILED_TAGS"; exit 1; }
