name: Sync READMEs to Registries

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"
  push:
    branches: [main]
    paths:
      - '.github/workflows/config/readme-sync.json'
      - '.github/workflows/sync-readmes.yml'

concurrency:
  group: sync-readmes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync READMEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install docker-pushrm
        run: |
          set -e
          mkdir -p "$HOME/.docker/cli-plugins"
          bin="$HOME/.docker/cli-plugins/docker-pushrm"
          curl -fsSL -o "$bin" \
            https://github.com/christian-korneck/docker-pushrm/releases/download/v1.9.0/docker-pushrm_linux_amd64
          chmod +x "$bin"
          echo "$HOME/.docker/cli-plugins" >> "$GITHUB_PATH"
          "$bin" --help >/dev/null

      - name: Restore README hash cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/readme-cache
          key: readme-sync-cache-v1-${{ github.run_id }}
          restore-keys: |
            readme-sync-cache-v1-

      - name: Sync READMEs
        env:
          DOCKER_USER__DOCKER_IO: ${{ vars.DOCKERHUB_USER }}
          DOCKER_PASS__DOCKER_IO: ${{ secrets.DOCKERHUB_PWD }}
          DOCKER_USER__QUAY_IO: ${{ vars.QUAY_ASCEND_USER }}
          DOCKER_PASS__QUAY_IO: ${{ secrets.QUAY_ASCEND_PWD }}
          APIKEY__QUAY_IO: ${{ secrets.QUAY_API_TOKEN != '' && secrets.QUAY_API_TOKEN || secrets.QUAY_ASCEND_PWD }}
        run: |
          set -euo pipefail

          CONFIG=".github/workflows/config/readme-sync.json"
          CACHE_DIR="/tmp/readme-cache"
          WORK_DIR="/tmp/readme-files"
          mkdir -p "$CACHE_DIR" "$WORK_DIR"

          count=$(jq 'length' "$CONFIG")
          echo "Loaded $count entries from $CONFIG"
          if [ "$count" -eq 0 ]; then
            echo "No entries configured; nothing to do."
            exit 0
          fi

          total=0 synced=0 skipped=0 failed=0

          # raw.gitcode.com 的 CDN 对 GHA runner IP 段返回 418 反爬，
          # 但 git 协议未拦截，将 raw URL 还原为仓库地址用 git 拉取。
          download_readme() {
            local url="$1" out="$2"
            if [[ "$url" =~ ^https://raw\.gitcode\.com/([^/]+)/([^/]+)/raw/([^/]+)/(.+)$ ]]; then
              local owner="${BASH_REMATCH[1]}" repo="${BASH_REMATCH[2]}"
              local branch="${BASH_REMATCH[3]}" path="${BASH_REMATCH[4]}"
              local tmp; tmp=$(mktemp -d)
              if git clone --quiet --depth=1 --filter=blob:none --sparse \
                   --branch "$branch" "https://gitcode.com/${owner}/${repo}.git" "$tmp" \
                 && git -C "$tmp" sparse-checkout set "$path" >/dev/null \
                 && [ -f "$tmp/$path" ]; then
                cp "$tmp/$path" "$out"
                rm -rf "$tmp"
                return 0
              fi
              rm -rf "$tmp"
              return 1
            fi
            curl -fsSL --max-time 60 --retry 3 --retry-delay 5 "$url" -o "$out"
          }

          while IFS=$'\t' read -r src dest; do
            total=$((total + 1))
            echo ""
            echo "=== [$total/$count] $src -> $dest ==="

            readme_file="$WORK_DIR/readme-${total}.md"
            if ! download_readme "$src" "$readme_file"; then
              echo "❌ download failed: $src"
              failed=$((failed + 1))
              continue
            fi

            new_hash=$(sha256sum "$readme_file" | awk '{print $1}')
            cache_key=$(echo "$dest" | tr '/:' '__')
            cache_file="$CACHE_DIR/${cache_key}.hash"
            if [ -f "$cache_file" ] && [ "$(cat "$cache_file")" = "$new_hash" ]; then
              echo "⏭️  skip (unchanged, sha256=${new_hash:0:12})"
              skipped=$((skipped + 1))
              continue
            fi

            case "$dest" in
              docker.io/*) provider_args=() ;;
              quay.io/*)   provider_args=(--provider quay) ;;
              *)
                echo "❌ unsupported registry: $dest"
                failed=$((failed + 1))
                continue
                ;;
            esac

            set +e
            docker-pushrm "${provider_args[@]}" --file "$readme_file" "$dest"
            rc=$?
            set -e

            if [ $rc -eq 0 ]; then
              echo "✅ synced (sha256=${new_hash:0:12})"
              echo "$new_hash" > "$cache_file"
              synced=$((synced + 1))
            else
              echo "❌ docker-pushrm failed (exit $rc) for $dest"
              failed=$((failed + 1))
            fi
          done < <(jq -r '.[] | "\(.src)\t\(.dest)"' "$CONFIG")

          echo ""
          echo "=== Summary: $synced synced, $skipped skipped, $failed failed (of $total) ==="
          [ "$failed" -eq 0 ]

      - name: Save README hash cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/readme-cache
          key: readme-sync-cache-v1-${{ github.run_id }}
